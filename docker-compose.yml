services:
  recap-demo:
    build: .
    ports:
      - "5000:5000"
    volumes:
      # Mount the entire project — code changes are reflected instantly
      - .:/app
      # Persist uploads, results, and task state across container restarts
      - ./demo/uploads:/app/demo/uploads
      - ./demo/results:/app/demo/results
      - ./demo/task_state:/app/demo/task_state
    env_file:
      - .env
    environment:
      - FLASK_DEBUG=1
    restart: unless-stopped
